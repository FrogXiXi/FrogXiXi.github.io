<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 你好蛙！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 标题 -->
  <h1 class="title">你好蛙！欢迎来这个池塘玩水^^</h1>

  <!-- ======== 池塘（占满大部分视口） ======== -->
  <div class="pond" id="pond">

    <!-- 像素锯齿边缘 -->
    <div class="edge edge-t"></div>
    <div class="edge edge-b"></div>
    <div class="edge edge-l"></div>
    <div class="edge edge-r"></div>

    <!-- 水面波纹装饰线 -->
    <div class="wline w1"></div>
    <div class="wline w2"></div>
    <div class="wline w3"></div>
    <div class="wline w4"></div>

    <!-- 青蛙（固定中央） -->
    <div class="frog-wrap interactive" id="frogWrap">
      <img src="images/lily_pad.png" alt="荷叶座位" class="frog-seat" />
      <img src="images/frog_sit.png" alt="青蛙" class="frog" id="frog" />
      <div class="frog-shadow"></div>
    </div>

    <!-- 思考气泡（点击青蛙弹出，在青蛙上方） -->
    <div class="think-bubble" id="thinkBubble">
      <img src="images/think.png" alt="" class="think-img" />
      <div class="think-content">
        <img src="images/Left_arrow.png" alt="左" class="think-arrow arrow-left interactive" id="arrowLeft" />
        <a href="#" class="think-link interactive" id="thinkLink"><span class="think-icon" id="thinkIcon">🐇</span></a>
        <img src="images/Right_arrow.png" alt="右" class="think-arrow arrow-right interactive" id="arrowRight" />
      </div>
    </div>

    <!-- JS 随机填充的容器 -->
    <div id="elContainer"></div>

  </div>

  <footer class="footer">🐸 蛙蛙池塘 &copy; 2026</footer>
  <script src="script.js"></script>
</body>
</html>
