<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 你好蛙！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 整个场景容器 -->
  <div class="scene">

    <!-- 标题：页面中央偏上 -->
    <h1 class="title">你好蛙！欢迎来这个池塘玩水🐸</h1>

    <!-- ======== 池塘（椭圆水面） ======== -->
    <div class="pond" id="pond">

      <!-- 坐姿青蛙（池塘正中偏上） -->
      <div class="frog-wrap interactive" id="frogWrap">
        <img src="images/frog_sit.png" alt="坐姿青蛙" class="frog" id="frog" />
      </div>

      <!-- 荷叶按钮（点击青蛙弹出） -->
      <div class="nav-buttons" id="navButtons">
        <a href="#" class="nav-btn interactive">
          <img src="images/lily_pad.png" alt="" class="nav-btn-bg" />
          <span class="nav-btn-text">兔子冒险</span>
        </a>
        <a href="#" class="nav-btn interactive">
          <img src="images/lily_pad.png" alt="" class="nav-btn-bg" />
          <span class="nav-btn-text">生日蛋糕</span>
        </a>
      </div>

      <!-- 荷叶 ×4 -->
      <img src="images/lily_pad.png" alt="荷叶" class="decor lily-pad interactive lp1" />
      <img src="images/lily_pad.png" alt="荷叶" class="decor lily-pad interactive lp2" />
      <img src="images/lily_pad.png" alt="荷叶" class="decor lily-pad interactive lp3" />
      <img src="images/lily_pad.png" alt="荷叶" class="decor lily-pad interactive lp4" />

      <!-- 小花 ×3 -->
      <img src="images/flower.png" alt="小花" class="decor flower f1" />
      <img src="images/flower.png" alt="小花" class="decor flower f2" />
      <img src="images/flower.png" alt="小花" class="decor flower f3" />

      <!-- 小鱼 ×3 -->
      <img src="images/fish.png" alt="小鱼" class="decor fish fish1" />
      <img src="images/fish.png" alt="小鱼" class="decor fish fish2" />
      <img src="images/fish.png" alt="小鱼" class="decor fish fish3" />

      <!-- 水草 ×3（池塘底部边缘） -->
      <img src="images/grass.png" alt="水草" class="decor grass g1" />
      <img src="images/grass.png" alt="水草" class="decor grass g2" />
      <img src="images/grass.png" alt="水草" class="decor grass g3" />

    </div><!-- /.pond -->

  </div><!-- /.scene -->

  <footer class="footer">🐸 蛙蛙池塘 &copy; 2026</footer>

  <script src="script.js"></script>
</body>
</html>
