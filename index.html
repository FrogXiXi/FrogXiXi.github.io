<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 你好蛙！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scene">
    <h1 class="title">你好蛙！欢迎来这个池塘玩水🐸</h1>

    <!-- ======== 池塘 ======== -->
    <div class="pond" id="pond">

      <!-- 像素锯齿边缘（CSS 阶梯） -->
      <div class="pixel-border pb-top"></div>
      <div class="pixel-border pb-bottom"></div>
      <div class="pixel-border pb-left"></div>
      <div class="pixel-border pb-right"></div>

      <!-- 水面波纹线 -->
      <div class="water-line wl1"></div>
      <div class="water-line wl2"></div>
      <div class="water-line wl3"></div>

      <!-- 坐姿青蛙（固定中央） -->
      <div class="frog-wrap interactive" id="frogWrap">
        <img src="images/frog_sit.png" alt="坐姿青蛙" class="frog" id="frog" />
        <div class="frog-ripple"></div>
      </div>

      <!-- 思考对话框（点击青蛙弹出） -->
      <div class="think-bubble" id="thinkBubble">
        <img src="images/think.png" alt="思考" class="think-bg" />
        <div class="think-buttons">
          <a href="#" class="think-btn interactive" id="btnRabbit" title="兔子冒险">🐇</a>
          <a href="#" class="think-btn interactive" id="btnTree" title="生日蛋糕">🌳</a>
        </div>
      </div>

      <!-- 荷叶容器（JS 随机分布） -->
      <div id="lilyContainer"></div>
      <!-- 小花容器 -->
      <div id="flowerContainer"></div>
      <!-- 小鱼容器 -->
      <div id="fishContainer"></div>
      <!-- 水草容器（PNG） -->
      <div id="grassContainer"></div>
      <!-- CSS 像素水草容器 -->
      <div id="pixelGrassContainer"></div>

    </div><!-- /.pond -->
  </div><!-- /.scene -->

  <footer class="footer">🐸 蛙蛙池塘 &copy; 2026</footer>
  <script src="script.js"></script>
</body>
</html>
