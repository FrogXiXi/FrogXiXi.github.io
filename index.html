<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 你好蛙！</title>
  <!-- 像素圆润字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrap">

    <!-- 核心文案：页面中央偏上，缓慢上下浮动 -->
    <h1 class="title" id="title">你好蛙！欢迎来这个池塘玩水🐸</h1>

    <!-- 坐姿青蛙（核心交互触发点） -->
    <div class="frog-wrap interactive" id="frogWrap">
      <img src="images/frog_sit.png" alt="坐姿青蛙" class="frog" id="frog" draggable="false" />
    </div>

    <!-- 荷叶样式跳转按钮（点击青蛙后平滑弹出） -->
    <div class="nav-buttons" id="navButtons">
      <a href="#" class="nav-btn interactive" id="btnAdventure">
        <img src="images/lily_pad.png" alt="" class="nav-btn-bg" draggable="false" />
        <span class="nav-btn-text">兔子冒险</span>
      </a>
      <a href="#" class="nav-btn interactive" id="btnCake">
        <img src="images/lily_pad.png" alt="" class="nav-btn-bg" draggable="false" />
        <span class="nav-btn-text">生日蛋糕</span>
      </a>
    </div>

    <!-- ===== 池塘水面区域（椭圆形） ===== -->
    <div class="pond" id="pond">

      <!-- 荷叶 ×4 -->
      <img src="images/lily_pad.png" alt="荷叶" class="lily-pad interactive lp1" draggable="false" />
      <img src="images/lily_pad.png" alt="荷叶" class="lily-pad interactive lp2" draggable="false" />
      <img src="images/lily_pad.png" alt="荷叶" class="lily-pad interactive lp3" draggable="false" />
      <img src="images/lily_pad.png" alt="荷叶" class="lily-pad interactive lp4" draggable="false" />

      <!-- 水草 ×3 -->
      <img src="images/grass.png" alt="水草" class="grass g1" draggable="false" />
      <img src="images/grass.png" alt="水草" class="grass g2" draggable="false" />
      <img src="images/grass.png" alt="水草" class="grass g3" draggable="false" />

      <!-- 小花 ×3 -->
      <img src="images/flower.png" alt="小花" class="flower f1" draggable="false" />
      <img src="images/flower.png" alt="小花" class="flower f2" draggable="false" />
      <img src="images/flower.png" alt="小花" class="flower f3" draggable="false" />

      <!-- 小鱼 ×3 -->
      <img src="images/fish.png" alt="小鱼" class="fish fish1" draggable="false" />
      <img src="images/fish.png" alt="小鱼" class="fish fish2" draggable="false" />
      <img src="images/fish.png" alt="小鱼" class="fish fish3" draggable="false" />

    </div><!-- /.pond -->

  </div><!-- /.page-wrap -->

  <footer class="footer">🐸 蛙蛙池塘 &copy; 2026</footer>

  <script src="script.js"></script>
</body>
</html>
