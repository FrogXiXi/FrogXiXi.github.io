<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐸 你好蛙！</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating bubbles (generated by JS too, but seed a few) -->
  <div class="bubble" style="width:18px;height:18px;left:10%;bottom:0;animation-duration:9s;animation-delay:0s"></div>
  <div class="bubble" style="width:12px;height:12px;left:30%;bottom:0;animation-duration:11s;animation-delay:2s"></div>
  <div class="bubble" style="width:22px;height:22px;left:55%;bottom:0;animation-duration:8s;animation-delay:1s"></div>
  <div class="bubble" style="width:10px;height:10px;left:75%;bottom:0;animation-duration:13s;animation-delay:3s"></div>
  <div class="bubble" style="width:15px;height:15px;left:90%;bottom:0;animation-duration:10s;animation-delay:4s"></div>
  <div class="bubble" style="width:8px;height:8px;left:42%;bottom:0;animation-duration:14s;animation-delay:6s"></div>

  <div class="page">

    <!-- Hero Greeting -->
    <section class="hero">
      <div class="frog-face">🐸</div>
      <h1>你好蛙！欢迎来池塘玩水~</h1>
      <p>这是一个安静又可爱的小池塘，点点看会发生什么呀</p>
    </section>

    <!-- Pond Interactive Scene -->
    <div class="pond-scene" id="pond">
      <!-- Lily pads -->
      <div class="lilypad lp1" data-splash="🌿"></div>
      <div class="lilypad lp2" data-splash="💧"></div>
      <div class="lilypad lp3" data-splash="🌸"></div>
      <div class="lilypad lp4" data-splash="🍃"></div>
      <div class="lilypad lp5" data-splash="💦"></div>

      <!-- Central frog -->
      <div class="pond-frog" id="frogBtn" title="点我呱！">🐸</div>

      <!-- Small friends -->
      <div class="dragonfly">🪰</div>
      <div class="fish">🐟</div>

      <!-- Bottom wave -->
      <div class="pond-wave"></div>

      <!-- Nav popup (shown on frog click) -->
      <div class="nav-popup" id="navPopup">
        <button class="nav-close" id="navClose" title="关闭">✕</button>
        <a class="nav-btn" href="#">🏠 我的主页</a>
        <a class="nav-btn" href="#">📺 我的B站</a>
        <a class="nav-btn" href="#">🎵 我的抖音</a>
        <a class="nav-btn" href="#">💌 联系我</a>
      </div>
    </div>

    <p class="hint">👆 点击池塘水面看涟漪 · 点荷叶溅水花 · 点青蛙打开导航</p>

    <footer>
      <span>🐸</span> 蛙蛙池塘 &copy; 2026 · 呱~
    </footer>
  </div>

<script>
/* ====== Pond water ripple on click ====== */
const pond = document.getElementById('pond');
pond.addEventListener('click', function(e) {
  if (e.target.closest('.pond-frog') || e.target.closest('.nav-popup') || e.target.closest('.lilypad')) return;
  const rect = pond.getBoundingClientRect();
  const rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.left = (e.clientX - rect.left) + 'px';
  rip.style.top  = (e.clientY - rect.top) + 'px';
  pond.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());
});

/* ====== Lilypad splash ====== */
document.querySelectorAll('.lilypad').forEach(pad => {
  pad.addEventListener('click', function(e) {
    e.stopPropagation();
    const rect = pond.getBoundingClientRect();
    const emoji = pad.dataset.splash || '💧';
    // Create splash emoji
    const sp = document.createElement('div');
    sp.className = 'splash';
    sp.textContent = emoji;
    sp.style.left = (e.clientX - rect.left) + 'px';
    sp.style.top  = (e.clientY - rect.top) + 'px';
    pond.appendChild(sp);
    sp.addEventListener('animationend', () => sp.remove());
    // Also add a ripple
    const rip = document.createElement('div');
    rip.className = 'ripple';
    rip.style.left = (e.clientX - rect.left) + 'px';
    rip.style.top  = (e.clientY - rect.top) + 'px';
    pond.appendChild(rip);
    rip.addEventListener('animationend', () => rip.remove());
  });
});

/* ====== Frog click → show nav ====== */
const frogBtn  = document.getElementById('frogBtn');
const navPopup = document.getElementById('navPopup');
const navClose = document.getElementById('navClose');

frogBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  navPopup.classList.toggle('show');
});
navClose.addEventListener('click', function(e) {
  e.stopPropagation();
  navPopup.classList.remove('show');
});

/* Close popup when clicking outside */
document.addEventListener('click', function(e) {
  if (!navPopup.contains(e.target) && e.target !== frogBtn) {
    navPopup.classList.remove('show');
  }
});

/* ====== Dynamic bubbles ====== */
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 6 + Math.random() * 16;
  b.style.width = size + 'px';
  b.style.height = size + 'px';
  b.style.left = Math.random() * 100 + '%';
  b.style.bottom = '0';
  b.style.animationDuration = (8 + Math.random() * 8) + 's';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 16000);
}, 3000);
</script>

</body>
</html>
